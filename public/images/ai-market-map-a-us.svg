<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI equity market map for US and China</title>
  <desc id="desc">A market map splitting AI stock market exposure between Nasdaq-style US assets and A-share supply-chain assets.</desc>
  <rect width="1600" height="1040" fill="#FFFFFF"/>
  <text x="110" y="126" fill="#111113" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="720">AI equity market map</text>
  <text x="110" y="172" fill="#67676F" font-family="Inter, Arial, sans-serif" font-size="22">Different markets price different parts of the same AI infrastructure cycle.</text>
  <rect x="110" y="242" width="660" height="642" rx="30" fill="#F7F7F8" stroke="#DADAE0"/>
  <rect x="830" y="242" width="660" height="642" rx="30" fill="#F7F7F8" stroke="#DADAE0"/>
  <text x="160" y="314" fill="#111113" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="720">US / Nasdaq</text>
  <text x="880" y="314" fill="#111113" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="720">A-shares / China</text>
  <g font-family="Inter, Arial, sans-serif" font-size="24">
    <rect x="160" y="370" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="190" y="416" fill="#111113" font-weight="650">Frontier platforms</text>
    <rect x="160" y="466" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="190" y="512" fill="#111113" font-weight="650">Hyperscale cloud capex</text>
    <rect x="160" y="562" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="190" y="608" fill="#111113" font-weight="650">GPU / ASIC / EDA / equipment</text>
    <rect x="160" y="658" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="190" y="704" fill="#111113" font-weight="650">AI networking / optical ecosystem</text>
    <rect x="160" y="754" width="560" height="72" rx="18" fill="#111113"/>
    <text x="190" y="800" fill="#FFFFFF" font-weight="650">Pricing variable: growth durability</text>
    <rect x="880" y="370" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="910" y="416" fill="#111113" font-weight="650">Domestic compute substitution</text>
    <rect x="880" y="466" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="910" y="512" fill="#111113" font-weight="650">Optical modules / connectors / PCB</text>
    <rect x="880" y="562" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="910" y="608" fill="#111113" font-weight="650">Servers / power / cooling / IDC</text>
    <rect x="880" y="658" width="560" height="72" rx="18" fill="#FFFFFF" stroke="#DADAE0"/>
    <text x="910" y="704" fill="#111113" font-weight="650">AI applications in industry software</text>
    <rect x="880" y="754" width="560" height="72" rx="18" fill="#111113"/>
    <text x="910" y="800" fill="#FFFFFF" font-weight="650">Pricing variable: order conversion</text>
  </g>
  <line x1="110" y1="940" x2="1490" y2="940" stroke="#111113" stroke-opacity="0.14"/>
  <text x="110" y="980" fill="#67676F" font-family="Inter, Arial, sans-serif" font-size="20">US markets price global AI platform profits earlier; A-shares often price supply-chain localization, capex diffusion, and order elasticity.</text>
</svg>
